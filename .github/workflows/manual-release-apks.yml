name: Manual APK Release Builder

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version Name (e.g. 1.0.2)'
        required: true
        default: '1.0.1-manual'
      version_code:
        description: 'Version Code (e.g. 2)'
        required: true
        default: '1'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Build Phone APK
  # ─────────────────────────────────────────────
  android-mobile-build:
    name: Build Phone APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > android/app/deenpulse-release.keystore
          fi

      - name: Build Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          VERSION_NAME: ${{ inputs.version_name }}
          VERSION_CODE: ${{ inputs.version_code }}
        working-directory: android
        run: |
          if [ -f "app/deenpulse-release.keystore" ]; then
            ./gradlew :app:assembleRelease \
              -Pandroid.injected.signing.store.file=$PWD/app/deenpulse-release.keystore \
              -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
              -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
              -Pandroid.injected.signing.key.password="$KEY_PASSWORD" \
              -Pandroid.injected.version.name="$VERSION_NAME" \
              -Pandroid.injected.version.code=$VERSION_CODE
          else
            echo "⚠️ No release credentials found — running debug fallback"
            ./gradlew :app:assembleDebug \
              -Pandroid.injected.version.name="$VERSION_NAME" \
              -Pandroid.injected.version.code=$VERSION_CODE
          fi

      - name: Clean & Rename Mobile APK
        run: |
          mkdir -p build-artifacts
          if [ -f "android/app/build/outputs/apk/release/app-release.apk" ]; then
            cp android/app/build/outputs/apk/release/app-release.apk build-artifacts/DeenPulse-Phone-${{ inputs.version_name }}.apk
          else
            cp android/app/build/outputs/apk/debug/app-debug.apk build-artifacts/DeenPulse-Phone-Debug.apk
          fi

      - name: Upload Phone Artifact
        uses: actions/upload-artifact@v4
        with:
          name: deenpulse-phone-apk
          path: build-artifacts/*.apk
          retention-days: 7

  # ─────────────────────────────────────────────
  # Job 2: Build Wear OS APK
  # ─────────────────────────────────────────────
  wearos-companion-build:
    name: Build Wear OS APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > android/wear/deenpulse-release.keystore
          fi

      - name: Build Wear Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          VERSION_NAME: ${{ inputs.version_name }}
          VERSION_CODE: ${{ inputs.version_code }}
        working-directory: android
        run: |
          if [ -f "wear/deenpulse-release.keystore" ]; then
            ./gradlew :wear:assembleRelease \
              -Pandroid.injected.signing.store.file=$PWD/wear/deenpulse-release.keystore \
              -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
              -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
              -Pandroid.injected.signing.key.password="$KEY_PASSWORD" \
              -Pandroid.injected.version.name="$VERSION_NAME" \
              -Pandroid.injected.version.code=$VERSION_CODE
          else
            echo "⚠️ No release credentials found — running debug fallback"
            ./gradlew :wear:assembleDebug \
              -Pandroid.injected.version.name="$VERSION_NAME" \
              -Pandroid.injected.version.code=$VERSION_CODE
          fi

      - name: Clean & Rename Wear APK
        run: |
          mkdir -p build-artifacts
          if [ -f "android/wear/build/outputs/apk/release/wear-release.apk" ]; then
            cp android/wear/build/outputs/apk/release/wear-release.apk build-artifacts/DeenPulse-WearOS-${{ inputs.version_name }}.apk
          else
            cp android/wear/build/outputs/apk/debug/wear-debug.apk build-artifacts/DeenPulse-WearOS-Debug.apk
          fi

      - name: Upload Wear Artifact
        uses: actions/upload-artifact@v4
        with:
          name: deenpulse-wearos-apk
          path: build-artifacts/*.apk
          retention-days: 7
