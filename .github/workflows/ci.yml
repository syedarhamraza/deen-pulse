name: DeenPulse CI/CD

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Permissions needed to create a draft release on your repository
permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Build Phone APK (Auto-Versioned)
  # ─────────────────────────────────────────────
  android-mobile-build:
    name: Build Phone APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > android/app/deenpulse-release.keystore
          fi

      - name: Build Release APK with Dynamic Versioning
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        working-directory: android
        run: |
          if [[ "${{ github.ref_name }}" == v* ]]; then
            VERSION_NAME=${{ github.ref_name }}
            VERSION_NAME=${VERSION_NAME#v}
          else
            VERSION_NAME="0.0.1-manual"
          fi
          VERSION_CODE=${{ github.run_number }}

          if [ -f "app/deenpulse-release.keystore" ]; then
            ./gradlew :app:assembleRelease \
              -Pandroid.injected.signing.store.file=$PWD/app/deenpulse-release.keystore \
              -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
              -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
              -Pandroid.injected.signing.key.password="$KEY_PASSWORD" \
              -Pandroid.injected.version.name="$VERSION_NAME" \
              -Pandroid.injected.version.code=$VERSION_CODE
          else
            echo "⚠️ No release credentials found — running debug fallback"
            ./gradlew :app:assembleDebug
          fi

      - name: Clean & Rename Mobile APK
        run: |
          mkdir -p build-artifacts
          if [ -f "android/app/build/outputs/apk/release/app-release.apk" ]; then
            cp android/app/build/outputs/apk/release/app-release.apk build-artifacts/DeenPulse-Phone-${{ github.ref_name || 'manual' }}.apk
          else
            cp android/app/build/outputs/apk/debug/app-debug.apk build-artifacts/DeenPulse-Phone-Debug.apk
          fi

      - name: Upload Phone Artifact
        uses: actions/upload-artifact@v4
        with:
          name: phone-apk
          path: build-artifacts/*.apk
          retention-days: 1

  # ─────────────────────────────────────────────
  # Job 2: Build Wear OS APK (Auto-Versioned)
  # ─────────────────────────────────────────────
  wearos-companion-build:
    name: Build Wear OS APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > android/wear/deenpulse-release.keystore
          fi

      - name: Build Wear Release APK with Dynamic Versioning
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        working-directory: android
        run: |
          if [[ "${{ github.ref_name }}" == v* ]]; then
            VERSION_NAME=${{ github.ref_name }}
            VERSION_NAME=${VERSION_NAME#v}
          else
            VERSION_NAME="0.0.1-manual"
          fi
          VERSION_CODE=${{ github.run_number }}

          if [ -f "wear/deenpulse-release.keystore" ]; then
            ./gradlew :wear:assembleRelease \
              -Pandroid.injected.signing.store.file=$PWD/wear/deenpulse-release.keystore \
              -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
              -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
              -Pandroid.injected.signing.key.password="$KEY_PASSWORD" \
              -Pandroid.injected.version.name="$VERSION_NAME" \
              -Pandroid.injected.version.code=$VERSION_CODE
          else
            echo "⚠️ No release credentials found — running debug fallback"
            ./gradlew :wear:assembleDebug
          fi

      - name: Clean & Rename Wear APK
        run: |
          mkdir -p build-artifacts
          if [ -f "android/wear/build/outputs/apk/release/wear-release.apk" ]; then
            cp android/wear/build/outputs/apk/release/wear-release.apk build-artifacts/DeenPulse-WearOS-${{ github.ref_name || 'manual' }}.apk
          else
            cp android/wear/build/outputs/apk/debug/wear-debug.apk build-artifacts/DeenPulse-WearOS-Debug.apk
          fi

      - name: Upload Wear Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wear-apk
          path: build-artifacts/*.apk
          retention-days: 1

  # ─────────────────────────────────────────────
  # Job 3: Create GitHub Release Draft & Attach APKs
  # Runs ONLY when a tag is pushed
  # ─────────────────────────────────────────────
  create-release-draft:
    name: Create Release Draft
    needs: [android-mobile-build, wearos-companion-build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Phone APK
        uses: actions/download-artifact@v4
        with:
          name: phone-apk
          path: release-assets

      - name: Download Wear APK
        uses: actions/download-artifact@v4
        with:
          name: wear-apk
          path: release-assets

      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: true
          prerelease: false
          generate_release_notes: true
          files: |
            release-assets/*.apk
